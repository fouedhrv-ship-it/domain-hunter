name: Domain Hunter

on:
  schedule:
    - cron: '0 */3 * * *'   # scan principal : CatchDoms + WebExpire (toutes les 3h)
    - cron: '0 6 * * *'     # EDN — matin
    - cron: '0 13 * * *'    # EDN — midi
    - cron: '0 20 * * *'    # EDN — soir
    - cron: '*/30 * * * *'  # surveillance des favoris (prix, enchère, drop)
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  # ── Scan des domaines (toutes les 15 min) — CatchDoms + WebExpire ──────────
  hunt:
    name: Scan domaines
    runs-on: ubuntu-latest
    # Ne tourne pas sur push, ni sur les créneaux dédiés à EDN/favoris
    if: >
      github.event_name != 'push' &&
      (github.event_name != 'schedule' || github.event.schedule == '0 */3 * * *')

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run domain hunter
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENPAGERANK_API_KEY: ${{ secrets.OPENPAGERANK_API_KEY }}
          INSEE_TOKEN: ${{ secrets.INSEE_TOKEN }}
          INPI_TOKEN: ${{ secrets.INPI_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CATCHDOMS_TOKEN: ${{ secrets.CATCHDOMS_TOKEN }}
        run: python hunter.py

  # ── Scan EDN (3x/jour — compte déjà banni 2x par le passé à fréquence élevée,
  # d'où la bascule multi-comptes ci-dessous plutôt qu'un scan plus agressif) ──
  hunt-edn:
    name: Scan EDN (3x/jour)
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' && (github.event.schedule == '0 6 * * *' || github.event.schedule == '0 13 * * *' || github.event.schedule == '0 20 * * *'))

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run EDN scan
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENPAGERANK_API_KEY: ${{ secrets.OPENPAGERANK_API_KEY }}
          INSEE_TOKEN: ${{ secrets.INSEE_TOKEN }}
          INPI_TOKEN: ${{ secrets.INPI_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          EDN_SESSID: ${{ secrets.EDN_SESSID }}
          EDN_REME: ${{ secrets.EDN_REME }}
          # Comptes de secours (créés manuellement sur expireddomains.net) —
          # utilisés automatiquement si le compte principal est banni.
          # Ajoute EDN_SESSID_3/EDN_REME_3, etc. si besoin de plus de comptes.
          EDN_SESSID_2: ${{ secrets.EDN_SESSID_2 }}
          EDN_REME_2: ${{ secrets.EDN_REME_2 }}
        run: python hunter.py edn

  # ── Surveillance des favoris (30 min) — prix, enchère, drop ─────────────────
  monitor-favoris:
    name: Surveillance favoris
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' && github.event.schedule == '*/30 * * * *')

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run favoris monitor
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python hunter.py monitor

  # ── Déploiement dashboard (à chaque push sur main) ────────────────────────
  deploy-dashboard:
    name: Deploy dashboard → Cloudflare Pages
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & build dashboard
        working-directory: dashboard
        run: |
          npm install
          npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dashboard/dist --project-name=domain-hunter --commit-dirty=true
